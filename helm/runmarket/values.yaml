replicaCount: 1

image:
  repository: gudrb963/runmarket-api
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  hosts:
    - host: api.runmarket.cc
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"

# 외부에서 미리 생성한 k8s Secret 이름 (필수)
# kubectl create secret generic runmarket-app-secrets \
#   --from-literal=jwt-secret=<YOUR_JWT_SECRET> \
#   --from-literal=mail-password=<YOUR_MAIL_PASSWORD> \
#   --from-literal=admin-email=<YOUR_ADMIN_EMAIL> \
#   --from-literal=admin-password=<YOUR_ADMIN_PASSWORD>
app:
  existingSecret: "runmarket-app-secrets"
  secretKeys:
    jwtSecret: jwt-secret
    mailPassword: mail-password
    adminEmail: admin-email
    adminPassword: admin-password

# 외부에서 미리 생성한 k8s Secret 이름 (필수)
# kubectl create secret generic runmarket-db-credentials \
#   --from-literal=username=<DB_USERNAME> \
#   --from-literal=password=<DB_PASSWORD> \
#   --from-literal=database=<DB_NAME>
db:
  existingSecret: "runmarket-db-credentials"
  secretKeys:
    username: username
    password: password
    database: database

postgresql:
  enabled: true
  image:
    tag: "17"
  persistence:
    size: 1Gi
